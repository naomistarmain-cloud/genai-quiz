<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成AI活用検定 模擬試験 Vol.5</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif;
    color: #1e293b;
    background: #faf5ff;
    margin: 0;
    min-height: 100vh;
    padding: 0 0 calc(96px + env(safe-area-inset-bottom));
    overflow-x: hidden;
  }
  .quiz-wrap { max-width: 720px; margin: 16px auto; padding: 0 12px; }
  .badge-bar {
    background: #ede9fe; border: 1px solid #c4b5fd; border-radius: 10px;
    padding: 8px 14px; margin-bottom: 14px; font-size: 13px; font-weight: 700;
    color: #5b21b6; display: flex; justify-content: space-between; align-items: center;
  }
  .review-tag { background: #fef3c7; color: #92400e; padding: 2px 10px; border-radius: 6px; }
  .card {
    background: #faf5ff; border-radius: 20px; box-shadow: 0 2px 24px rgba(0,0,0,0.06);
    padding: 22px 18px;
  }
  .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .q-counter { display: flex; align-items: center; gap: 8px; color: #64748b; font-weight: 600; }
  .timer-box {
    display: flex; align-items: center; gap: 8px; padding: 8px 16px;
    background: #fff; border-radius: 99px; border: 1px solid #e2e8f0;
  }
  .timer-text { font-family: monospace; font-weight: 700; font-size: 16px; color: #334155; }
  .timer-warn { color: #ef4444 !important; }
  .progress-track { width: 100%; background: #e2e8f0; border-radius: 99px; height: 4px; margin-bottom: 16px; }
  .progress-fill { background: #7c3aed; border-radius: 99px; height: 4px; transition: width .3s; }
  .cat-tag {
    display: inline-block; padding: 4px 12px; background: #ede9fe; color: #5b21b6;
    font-size: 12px; font-weight: 700; border-radius: 6px; margin-bottom: 10px; letter-spacing: 1px;
  }
  .q-text { font-size: 17px; font-weight: 700; line-height: 1.75; margin: 0 0 18px; color: #1e293b; }
  .opt-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; }
  .opt-btn {
    width: 100%; min-height: 64px; text-align: left; padding: 16px; border-radius: 16px;
    border: 2px solid #e2e8f0; background: #fff; cursor: pointer; transition: all .18s;
    display: flex; align-items: flex-start; gap: 12px; font-family: inherit;
    touch-action: manipulation;
  }
  .opt-btn:hover:not(.answered), .opt-btn:focus-visible { border-color: #c4b5fd; outline: none; box-shadow: 0 0 0 4px rgba(196,181,253,0.32); }
  .opt-letter {
    width: 28px; height: 28px; border-radius: 50%; background: #f1f5f9; color: #64748b;
    display: flex; align-items: center; justify-content: center; font-weight: 700;
    flex-shrink: 0; font-size: 13px;
  }
  .opt-text { font-size: 15px; line-height: 1.62; color: #1e293b; }
  .opt-correct { border-color: #22c55e !important; background: #f0fdf4 !important; }
  .opt-correct .opt-letter { background: #22c55e; color: #fff; }
  .opt-wrong { border-color: #ef4444 !important; background: #fef2f2 !important; }
  .opt-dim { opacity: 0.5; }
  .explain-box { padding: 18px 20px; border-radius: 14px; }
  .explain-correct { background: #f0fdf4; border: 1px solid #bbf7d0; }
  .explain-wrong { background: #fef2f2; border: 1px solid #fecaca; }
  .explain-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-weight: 700; font-size: 16px; }
  .explain-body { margin: 0 0 14px; line-height: 1.8; color: #374151; }
  .bottom-nav {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    padding: 12px max(14px, env(safe-area-inset-left)) calc(12px + env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-right));
    background: rgba(250,245,255,0.96); border-top: 1px solid #ddd6fe;
    box-shadow: 0 -8px 24px rgba(15,23,42,0.08);
  }
  .nav-btn {
    min-height: 50px; border: none; border-radius: 14px; font-family: inherit;
    font-size: 16px; font-weight: 800; cursor: pointer; touch-action: manipulation;
  }
  .nav-prev { background: #fff; color: #5b21b6; border: 1px solid #c4b5fd; }
  .nav-next { background: #7c3aed; color: #fff; }
  .nav-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .nav-btn:focus-visible { outline: 3px solid rgba(124,58,237,0.35); outline-offset: 2px; }
  /* result screen */
  .result-card {
    max-width: 600px; margin: 24px auto; padding: 40px 32px; background: #fff;
    border-radius: 20px; box-shadow: 0 4px 32px rgba(0,0,0,0.08); text-align: center;
  }
  .result-title { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .result-score { font-size: 18px; margin-bottom: 8px; }
  .result-score b { font-size: 36px; font-weight: 800; }
  .pct-pass { color: #16a34a; }
  .pct-fail { color: #f59e0b; }
  .result-msg {
    font-size: 15px; font-weight: 700; margin-bottom: 24px; padding: 10px 20px;
    border-radius: 10px; display: inline-block;
  }
  .msg-pass { color: #166534; background: #dcfce7; }
  .msg-fail { color: #991b1b; background: #fee2e2; }
  .bar-track { background: #e5e7eb; border-radius: 99px; height: 14px; margin-bottom: 28px; }
  .bar-fill { border-radius: 99px; height: 14px; transition: width 1s; }
  .wrong-box {
    background: #fef9c3; border: 1px solid #fde047; border-radius: 12px;
    padding: 14px 18px; margin-bottom: 20px; text-align: left;
  }
  .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-primary, .btn-secondary {
    display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px;
    color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .btn-secondary { background: #f59e0b; }
  .btn-primary { background: #7c3aed; }
  .loading { text-align: center; padding: 40px; }
  @media (max-width: 520px) {
    body { padding-bottom: calc(92px + env(safe-area-inset-bottom)); }
    .quiz-wrap { margin: 10px auto; padding: 0 10px; }
    .badge-bar { align-items: flex-start; gap: 8px; padding: 8px 10px; font-size: 12px; }
    .card { border-radius: 16px; padding: 18px 14px; }
    .top-row { align-items: flex-start; gap: 10px; }
    .q-counter { font-size: 14px; }
    .timer-box { padding: 7px 11px; }
    .q-text { font-size: 16px; line-height: 1.72; }
    .opt-btn { min-height: 60px; padding: 14px; gap: 10px; }
    .opt-text { font-size: 14px; line-height: 1.6; }
    .explain-box { padding: 15px 14px; }
    .bottom-nav { gap: 8px; padding-inline: 10px; }
  }
</style>

<script>
(function() {
  var allQuestions = [
    {id:1,category:"AIの基礎",question:"「機械学習」の説明として最も適切なものを選びなさい。",options:["専門家がすべての判断ルールをコードで記述し、そのルールに従ってコンピューターが処理を行う従来型のプログラミング手法のこと","大量のデータからコンピューターが自動的にパターンや規則性を発見し、予測や判断ができるようにする技術のこと","ロボットに物理的な動作を繰り返し練習させることで、工場の生産ラインを自動化するための制御技術のこと","インターネット上に存在するWebページや画像などのデータを自動で収集・整理するためのクローリング技術のこと"],answer:1,explanation:"機械学習とは、大量のデータをコンピューターに与え、そこからパターンや規則性を自動的に学習させる技術です。人間が明示的にルールを記述しなくても、データから判断・予測ができるようになります。"},
    {id:2,category:"AIの基礎",question:"「教師あり学習」の説明として最も適切なものを選びなさい。",options:["正解ラベルのないデータだけを使い、AIがデータのグループや構造を自律的に発見していく教師不在の学習手法のこと","正解ラベルつきの入出力ペアを大量に使って、入力に対する正しい出力の対応関係をモデルに学習させる手法のこと","AIがゲームや環境と試行錯誤しながら報酬シグナルを最大化するよう自律的に行動を改善していく学習手法のこと","複数の異なるAIモデルの予測を統合・多数決することで、単体モデルより高い精度を実現するアンサンブル学習の手法のこと"],answer:1,explanation:"教師あり学習は、入力データとそれに対応する正解ラベル（答え）のペアを使って学習する手法です。画像分類・スパムメール検出・売上予測などに広く使われています。"},
    {id:3,category:"AIの基礎",question:"ニューラルネットワークの「ノード（ニューロン）」が模倣しているものとして最も適切なものを選びなさい。",options:["電気信号をオン・オフで処理するコンピューターのトランジスタ回路と、その論理演算の仕組みを模倣したもの","人間の脳内で情報を伝達・処理する神経細胞（ニューロン）とそのシナプス接続のネットワーク構造を模倣したもの","インターネット上で世界中のサーバーが相互に接続・通信するネットワークトポロジーの構造を模倣したもの","半導体チップ上に集積された数十億個のトランジスタが電気信号を高速処理する集積回路の構造を模倣したもの"],answer:1,explanation:"ニューラルネットワークは、人間の脳内の神経細胞（ニューロン）とそのつながりを模倣した数学的なモデルです。多数のノードが層状に接続されており、データから特徴を学習します。"},
    {id:4,category:"AIの基礎",question:"学習データには高い精度を示すが、未知のデータには精度が大きく落ちる状態を何というか。",options:["汎化（ジェネラライゼーション）：未知のデータに対しても安定して高い予測精度を発揮できる理想的な学習状態のこと","過学習（オーバーフィッティング）：学習データのノイズや細部まで記憶しすぎて未知データへの対応力が低下した状態のこと","転移学習（トランスファーラーニング）：あるタスクで学習した知識を別の関連タスクに応用して効率的に学習する手法のこと","正則化（レギュラライゼーション）：モデルの複雑さにペナルティを与えることで過学習を防ぎ汎化性能を高める技術のこと"],answer:1,explanation:"過学習（オーバーフィッティング）は、AIが学習データに過剰に適合しすぎて、学習していない新しいデータへの対応力（汎化能力）が低下した状態です。"},
    {id:5,category:"AIの基礎",question:"2010年代以降の第三次AIブームを牽引した技術として最も適切なものを選びなさい。",options:["エキスパートシステム：専門家の知識をルールベースで記述し、推論エンジンで質問に答える知識ベースシステムのこと","遺伝的アルゴリズム：自然界の進化（選択・交叉・突然変異）を模倣して最適解を探索するメタヒューリスティック手法のこと","ディープラーニング（深層学習）：多層のニューラルネットワークと大量データにより画像・音声・言語処理で飛躍的成果を上げた手法のこと","ベイズ統計：事前確率と観測データを組み合わせて事後確率を更新するベイズの定理に基づく確率的推論フレームワークのこと"],answer:2,explanation:"2010年代以降の第三次AIブームは、ディープラーニング（深層学習）が主な牽引役です。大量データとGPUの計算能力の向上により、画像認識・音声認識・自然言語処理で飛躍的な進歩が起きました。"},
    {id:6,category:"生成AI",question:"「自然言語処理（NLP）」の説明として最も適切なものを選びなさい。",options:["コンピューターが写真や映像に含まれる物体・人物・シーンを認識・分類するための画像認識・コンピュータビジョン技術のこと","コンピューターが人間の日常言語（テキスト・音声）を理解・生成・翻訳・要約するための技術であり、LLMの基盤となるもの","コンピューターが楽譜データや音声波形を解析し、自動で作曲・編曲・演奏を行うための音楽情報処理技術のこと","コンピューターが数値・統計データを解析してグラフや可視化を自動生成し、ビジネスレポートを作成するBI技術のこと"],answer:1,explanation:"自然言語処理（NLP）は、コンピューターが人間の言語を理解・生成・翻訳・要約するための技術です。ChatGPTなどの大規模言語モデルはNLPの代表的な応用です。"},
    {id:7,category:"生成AI",question:"生成AIが学習データの収集期限以降の出来事を知らないという特性を何というか。",options:["ハルシネーション：AIが学習データに存在しない情報をもっともらしく生成してしまう現象で、誤情報リスクの主要因のこと","ナレッジカットオフ：AIの学習データ収集の締め切り日以降の最新情報をAIが持っていないという特性のこと","プロンプトインジェクション：悪意ある指示を入力に埋め込んでAIの本来の動作を乗っ取る攻撃手法のこと","バイアス：学習データに含まれる偏りをAIが学習し、特定グループへ不公平な出力をする問題のこと"],answer:1,explanation:"ナレッジカットオフとは、AIが学習したデータの収集期限を指します。この期限以降に起きた出来事や更新された情報はAIが知らないため、最新情報が必要な場合は別途確認が必要です。"},
    {id:8,category:"生成AI",question:"大規模言語モデル（LLM）の「パラメータ」とは何か。最も適切なものを選びなさい。",options:["AIが一度の処理で参照できるテキストの上限量であり、長い文書を扱う際にこの範囲を超えると古い情報が切り捨てられる仕組み","学習を通じて自動調整されるモデル内部の数値であり、その総数（パラメータ数）がモデルの表現能力の指標になるもの","ユーザーがAIに与える指示文・質問文のことであり、その書き方によってAIの出力品質が大きく変わるプロンプトのこと","AIの出力のランダム性を制御するTemperatureや出力長のmax_tokensなど、推論時に設定できるハイパーパラメータのこと"],answer:1,explanation:"パラメータとは、学習を通じて自動的に調整されるモデル内部の数値のことです。パラメータ数が多いほどモデルが表現できる複雑さが増し、一般的に高い能力を持ちます。"},
    {id:9,category:"生成AI",question:"テキスト生成AIを使って文章を作成する際に最も注意すべきこととして適切なものを選びなさい。",options:["AIが生成したすべての文章は著作権法上フリーとなるため、そのまま商業出版や広告コピーに使用することが法的に保証されている","AIの出力には事実誤認・数値の誤り・存在しない引用などが含まれる場合があるため、重要な内容は必ず一次ソースで確認する","AIは絶対に個人情報や機密情報を生成しない安全設計となっているため、出力結果を事前審査なく社外に公開できる","AIの出力はすべて法律上無効な文書として扱われるため、契約書・報告書・公式文書への利用が全面的に禁止されている"],answer:1,explanation:"テキスト生成AIはハルシネーションが発生する場合があります。特に事実関係・数値・日付・引用などは誤りが含まれる可能性があるため、重要な内容は一次ソースで確認することが必要です。"},
    {id:10,category:"生成AI",question:"音楽生成AIの活用として適切でないものを選びなさい。",options:["YouTubeやPodcastに掲載するオリジナルのBGMやジングルを短時間で制作し、著作権フリーの音楽素材として活用すること","ゲームやアプリのシーンに合わせた効果音・環境音・BGMをプロトタイプ段階で素早く生成してユーザーテストに活用すること","有名アーティストの楽曲スタイルや声質を許可なく模倣した音源を商業的に販売し、ストリーミング収益を得る目的で使用すること","作曲の知識や楽器演奏スキルがなくても、テキスト指示だけでオリジナルの楽曲デモを生成して音楽制作の出発点にすること"],answer:2,explanation:"既存アーティストの楽曲を無断でコピー・販売することは著作権侵害にあたります。音楽生成AIはオリジナル楽曲の制作補助・BGM制作・効果音作成などの正当な用途に活用すべきです。"},
    {id:11,category:"生成AI",question:"AIが人間の指示に従いWeb検索・ファイル操作・コード実行などを自律的にこなすシステムを何というか。",options:["チャットボット：事前定義されたシナリオやルールに基づいてユーザーの質問に定型的な回答を返す自動応答システムのこと","AIエージェント：目標達成に向けて複数のツールやステップを自律的に計画・実行し複雑なタスクを遂行するシステムのこと","検索エンジン：Webページをクロール・インデックスし、キーワードに関連性の高いページを順位付けして表示するシステムのこと","音声認識システム：マイク入力された音声波形をテキストデータに変換するための自動音声認識（ASR）技術のこと"],answer:1,explanation:"AIエージェントは、ユーザーの目標を理解し、複数のツールやステップを自律的に使いながらタスクを遂行するシステムです。単純な一問一答を超えた複雑な作業の自動化が可能になります。"},
    {id:12,category:"生成AI",question:"文章・画像・音声などを入力として受け取り、別の形式で出力できる生成AIの特性を何というか。",options:["ファインチューニング：事前学習済みモデルを特定のドメインや業務向けデータで追加学習し専門性を高める技術手法のこと","マルチモーダル：テキスト・画像・音声・動画など複数の異なるデータ形式を統合的に処理できる生成AIの特性のこと","RAG（検索拡張生成）：外部データベースをリアルタイムで検索参照しその情報をもとに回答を生成する技術のこと","強化学習：AIが環境と試行錯誤しながら報酬を最大化するよう行動方針を自律的に改善していく機械学習の手法のこと"],answer:1,explanation:"マルチモーダルとは、テキスト・画像・音声・動画など複数の異なる形式のデータを扱える特性です。例えば画像を入力して説明文を生成したり、テキストから画像を生成したりできます。"},
    {id:13,category:"生成AIの動向",question:"Googleが開発・提供している生成AIサービスとして最も適切なものを選びなさい。",options:["ChatGPT：OpenAIが開発した対話型生成AIで、GPTシリーズのモデルを基盤とし2022年末に公開された大規模言語モデルサービス","Gemini：Googleが開発した生成AIサービスで、テキスト・画像・音声などマルチモーダル処理に対応した大規模言語モデル","Claude：Anthropicが開発した生成AIで、Constitutional AIによる安全性重視の設計が特徴の大規模言語モデルサービス","Copilot：MicrosoftがOpenAIとの提携のもと開発し、Office製品やBingに統合した生成AIアシスタントサービス"],answer:1,explanation:"GeminiはGoogleが開発・提供している生成AIサービスです。ChatGPTはOpenAI、ClaudeはAnthropic、CopilotはMicrosoftが主に提供しています。"},
    {id:14,category:"生成AIの動向",question:"生成AIの「API（Application Programming Interface）」とは何か。最も適切なものを選びなさい。",options:["AIモデルを学習させるために大量収集した多様なテキスト・画像・音声などのトレーニング用データセットのこと","外部のアプリやシステムが生成AIの機能をプログラムから呼び出して利用するための標準的な接続インターフェースのこと","AIの推論処理速度（1秒あたりのトークン生成数）や精度（正解率）などを数値で評価・比較するためのベンチマーク指標のこと","AIサービスの課金単位であり、処理した文字数や画像枚数に応じてユーザーに請求される従量課金の計算基準のこと"],answer:1,explanation:"APIとは、外部のアプリケーションやシステムがAIの機能を利用するための接続口です。APIを使うことで、自社のシステムや業務ツールに生成AIの機能を組み込むことができます。"},
    {id:15,category:"生成AIの動向",question:"社内文書を活用した専用AIチャットボット構築に多く用いられる技術の組み合わせとして最も適切なものを選びなさい。",options:["GAN＋強化学習：本物と偽物を競わせる生成モデルと試行錯誤型の報酬学習を組み合わせて社内知識を生成するアプローチ","RAG＋大規模言語モデル：社内文書をリアルタイム検索し参照した情報をもとにLLMが回答を生成する社内特化型の構成","クラスタリング＋決定木：文書をグループ分けしてから木構造のルールで分類する教師なし＋教師あり学習の組み合わせ","CNN＋RNN：画像特徴を抽出する畳み込み層と系列データを処理する再帰型ネットワークを組み合わせた時系列解析構成"],answer:1,explanation:"社内専用チャットボットの構築には、外部ドキュメントを参照するRAGと大規模言語モデル（LLM）を組み合わせる手法が広く使われています。社内文書に基づいた正確な回答が可能になります。"},
    {id:16,category:"生成AIの動向",question:"生成AIサービスの「有料プラン」の特徴として一般的に正しいものを選びなさい。",options:["無料プランとまったく同じ機能・モデル・処理量が使えるが、優先サポートが受けられるだけで技術的な差異はないもの","最新・高性能モデルへのアクセス・処理量の拡大・優先レスポンスなど、業務活用に適した追加機能が利用できるプラン","有料プランに契約すると個人情報の提供が法律上義務付けられ、提供を拒否すると利用が停止される仕組みのもの","無料プランでは日本語が使えないが有料プランでは多言語対応になるなど、対応言語の違いのみで機能差は生じないもの"],answer:1,explanation:"多くの生成AIサービスでは、有料プランで最新・高性能モデルへのアクセス・処理量の拡大・優先レスポンスなどの機能が利用できます。業務での本格活用には有料プランが適する場合が多いです。"},
    {id:17,category:"生成AIの動向",question:"「オープンソース」の生成AIモデルについて正しい説明を選びなさい。",options:["特定の政府機関や公的機関だけが管理・運営し、国民が申請することで利用許可が与えられる公共AIモデルのこと","モデルの構造・重みが公開されており、自社サーバーへの導入やカスタマイズが可能なモデルで、ライセンスの確認が必要","API経由のクラウドサービスとしてのみ提供され、モデルの内部構造は非公開で利用者は外部から機能のみを使うクローズドなもの","学術研究目的のみに限定されており、商用・業務目的での利用がすべて禁止されている非営利専用のAIモデルのこと"],answer:1,explanation:"オープンソースのAIモデルはモデルの構造・重みが公開されており、自社のサーバーにインストールして利用・カスタマイズが可能です。ただしライセンスによって商用利用の条件が異なるため確認が必要です。"},
    {id:18,category:"情報リテラシー",question:"生成AIが作成した文章をそのままSNSに投稿する際に注意すべき点として最も適切なものを選びなさい。",options:["AIが生成した文章は常に中立・客観的で正確なため、そのまま投稿しても誤情報拡散や名誉毀損のリスクは発生しない","誤情報・不適切表現・著作権侵害がないか投稿者が確認・修正してから投稿することが必要であり最終責任は投稿者にある","AI生成コンテンツはすべてのSNSプラットフォームの利用規約で投稿が明示的に禁止されており違反すると垢BAN対象となる","AI生成であることを「#AI生成」などのハッシュタグで明記さえすれば、内容の確認なしにどんな文章でも投稿が許可される"],answer:1,explanation:"AI生成の文章には誤情報・意図しない不適切表現・著作物の無断引用などが含まれる場合があります。SNS投稿前に内容を確認し、必要に応じて修正することが重要です。"},
    {id:19,category:"情報リテラシー",question:"生成AIを活用して作成したレポートや報告書を提出する際の正しい姿勢を選びなさい。",options:["AIが自律的に作成した文書の内容責任はAIを開発した企業にあるため、提出者は誤りがあっても法的・倫理的責任を問われない","AI作成であることを開示すべき場面かを確認し、内容の正確性については提出者本人が責任を持つことが基本姿勢である","学校・職場を問わずAIを使って提出物を作成することは国際標準として全面的に違反行為と定められている","AIが生成した文書は著作権法の保護を受けないため、他人がそのまま転用しても盗用にあたらず問題は発生しない"],answer:1,explanation:"AIを使って作成した文書であっても、提出者が内容の正確性に責任を持つことが基本です。また職場・学校・機関によってAI使用の開示ルールが異なるため、事前に確認することが大切です。"},
    {id:20,category:"情報リテラシー",question:"「AIが生成した画像」の信頼性を確認する方法として最も適切なものを選びなさい。",options:["SNSでのシェア数やいいね数が多い画像は多くのユーザーが本物と判断した証拠であり、一般的に信頼性が高いと判断できる","画像の発信元が公式機関・信頼できる報道機関かを確認し、リバース画像検索などで出典を確かめることが有効な方法である","解像度が高くディテールが鮮明な画像は撮影機材の性能の高さを示しており、AI生成画像より本物である可能性が高い","白黒・セピアトーンの画像は高度なAI生成技術では再現が難しく、現時点ではカラー画像よりも本物である可能性が高い"],answer:1,explanation:"AI生成画像の見分けが難しくなっている現在、画像の信頼性は発信元（公式機関・信頼できる報道機関）を確認することが重要です。シェア数・鮮明さ・色などは信頼性の判断基準にはなりません。"},
    {id:21,category:"情報リテラシー",question:"AI生成コンテンツであることを示す情報をデータに不可視の形で埋め込む技術を何というか。",options:["ハルシネーション：AIが学習データにない情報を確信を持って生成してしまう誤情報現象でAI特有の信頼性リスクのこと","電子透かし（ウォーターマーク）：AI生成であることを示す情報を人間の目に見えない形でデータに埋め込む識別技術のこと","プロンプトインジェクション：悪意ある指示を入力に埋め込んでAIの本来の動作を意図的に改ざん・乗っ取る攻撃手法のこと","ファインチューニング：事前学習済みモデルをドメイン固有データで追加学習させ特定業務への適応性を高める技術手法のこと"],answer:1,explanation:"電子透かし（ウォーターマーク）は、AI生成コンテンツであることを示す情報をデータに埋め込む技術です。人間の目には見えない形で埋め込まれ、AI生成コンテンツの識別・追跡に活用されます。"},
    {id:22,category:"情報リテラシー",question:"生成AIで調べ物をする際に「情報の鮮度」について注意すべき理由として最も適切なものを選びなさい。",options:["生成AIはリアルタイムでWeb全体を検索しているため、常に秒単位で更新された最新情報を提供でき鮮度の問題は発生しない","AIには学習データのカットオフ（締め切り日）があり、それ以降の出来事・法改正・新製品情報を持っていない場合がある","AIの回答はつねに過去10年以上前の古い研究や文献のみを参照しており、現代の情報を扱う用途には根本的に不向きである","AIは毎日自動でニュースサイトを巡回し学習データを更新しているため、情報の鮮度より回答文章の品質管理を優先すべきである"],answer:1,explanation:"多くの生成AIには学習データのカットオフ（締め切り日）があり、それ以降に起きた出来事を知りません。最新情報が必要な場合は、AI以外の信頼できる情報源で確認することが重要です。"},
    {id:23,category:"倫理・リスク",question:"AIが採用・融資・医療などで差別的な判断を行うリスクを低減するための対策として最も適切なものを選びなさい。",options:["AIの判断は統計的・数学的な根拠に基づく客観的な処理であるため、人間の偏見と異なり差別的な結果を生む可能性はない","偏りのある学習データを排除し、異なる属性グループ間での公平性テストを定期的に実施して継続的にモニタリングする","AIをできるだけ多くの社会分野に広く採用することで多様なデータが集まり、自然に差別的要因が統計的に打ち消される","AIが下した判断を人間が一切修正せず最終決定とすることで、人間の主観的バイアスが混入するリスクを排除できる"],answer:1,explanation:"AIの差別的な判断リスクを低減するには、学習データの偏りを排除し、異なる属性グループ間での公平性を定期的にテスト・監視することが重要です。"},
    {id:24,category:"倫理・リスク",question:"「AIの透明性」が重要とされる理由として最も適切なものを選びなさい。",options:["AIシステムの処理プロセスを透明にすることで並列計算効率が向上し、応答速度や処理コストの大幅な改善につながるから","AIの判断根拠を理解・確認できることで誤りの発見や信頼構築につながり、法的説明責任の履行も可能になるから","AIを透明に設計するとハルシネーションの発生確率が数学的にゼロになることが理論的に証明されているから","AIの透明性確保はモデルのパラメータ数を削減し学習コストを低下させるための費用対効果改善が唯一の目的であるから"],answer:1,explanation:"AIの透明性とは、AIがなぜその判断や出力を行ったかを理解・説明できることです。これにより誤りの早期発見・不正な利用の抑制・ユーザーの信頼構築・法的な説明責任の履行が可能になります。"},
    {id:25,category:"倫理・リスク",question:"生成AIを使ったなりすまし詐欺への対策として最も適切なものを選びなさい。",options:["知人・上司・家族から届いたメッセージや電話は発信元の表示を信頼し、内容が不自然でも追加確認せずに従うことが礼儀的対応","音声・動画・テキストによる指示でも、重要な取引や送金は事前に決めた別手段で本人確認するルールを組織全体で徹底する","AI生成の音声やディープフェイク動画は品質が低く不自然なため、少し注意すれば誰でも容易に本物と見分けられる","詐欺はAI普及以前から存在する古典的な犯罪であり、AI技術は詐欺の巧妙化に対してほとんど影響を与えていない"],answer:1,explanation:"生成AIによる音声クローン・ディープフェイク動画を使ったなりすまし詐欺が実際に発生しています。重要な取引・送金依頼は、事前に決めた方法で本人に直接確認することが有効な対策です。"},
    {id:26,category:"倫理・リスク",question:"企業がAIシステム導入時に「倫理的リスク評価」を行う目的として最も適切なものを選びなさい。",options:["競合他社と同等のAIシステムを導入していることを投資家・株主・メディアにアピールするためのパフォーマンス的な活動","AIシステムが引き起こしうる差別・プライバシー侵害・誤情報などの問題を事前に特定し、設計段階から対策を講じるため","法律によって上場企業のすべてに倫理的リスク評価の年次実施と規制当局への報告が義務付けられているコンプライアンス要件","AIの処理速度・コスト効率・スケーラビリティなどの技術的なパフォーマンス指標を多角的に評価するための技術審査活動"],answer:1,explanation:"倫理的リスク評価は、AIシステムが社会・ユーザー・組織にもたらす可能性のある悪影響（差別・プライバシー侵害・誤情報の拡散など）を事前に特定し、対策を講じるために行います。"},
    {id:27,category:"倫理・リスク",question:"生成AIを使って実在の政治家の発言を捏造した動画を作成・拡散することの問題点として最も適切なものを選びなさい。",options:["生成AIで制作した動画は画質が低いため視聴者が容易に偽物と判断でき、社会的影響は軽微で現時点では法的規制も不要","選挙や社会の意思決定を歪める民主主義への脅威となり、名誉毀損・虚偽情報拡散として法的問題が生じる深刻なリスクがある","AI生成コンテンツの責任はすべてAI開発会社に帰属し、動画を作成・拡散した個人や組織は一切の法的責任を負わない","現行の著作権法のみが適用される問題であり、名誉毀損・選挙干渉・虚偽情報拡散の法律とは完全に別の問題として扱われる"],answer:1,explanation:"AIが生成した政治家の虚偽発言動画（ディープフェイク）は、有権者の判断を歪め民主的な選挙プロセスを脅かします。また名誉毀損や虚偽情報拡散として法的問題も生じます。"},
    {id:28,category:"倫理・リスク",question:"AIシステムの「アカウンタビリティ（説明責任）」について最も適切な説明を選びなさい。",options:["AIが自律的かつリアルタイムに自身の判断プロセスを自然言語で説明できる技術的な能力のことであり、XAI研究の中心課題","AIの判断・結果・影響に対して開発者・運用者・利用者である人間が責任を持ち必要に応じて説明・対応できることを指す","AIシステムの処理速度・精度・稼働率などの技術的パフォーマンス指標を経営層やステークホルダーに数値報告する活動","AIの運用コスト・投資対効果（ROI）・ライセンス費用などの財務的な説明を利害関係者に対して行う予算報告活動"],answer:1,explanation:"アカウンタビリティ（説明責任）とは、AIの判断・結果・影響に対して、開発者・運用者・利用者の人間が責任を持ち、必要に応じて説明・対応できることを指します。AIに責任を転嫁することはできません。"},
    {id:29,category:"法律・ガイドライン",question:"生成AIで作成した文章を商業目的で使用する際に確認すべきこととして最も適切なものを選びなさい。",options:["生成AIが作成した文章はすべて著作権フリーのパブリックドメインとして扱われ、どのAIサービスでも商業利用が自動的に保証される","利用したAIサービスの利用規約で商業利用が許可されているか・著作権の帰属条件はどうかを事前に確認することが必要","商業利用はAIサービスの種類にかかわらず世界共通で全面禁止されており、商業コンテンツへのAI活用はすべて違法行為","利用規約や著作権に関係なく、人間が最終的に編集・確認した文章であれば商業利用について一切の法的問題は生じない"],answer:1,explanation:"生成AIサービスによって商業利用の可否・条件が異なります。利用規約で「生成コンテンツの商業利用の可否」「著作権の帰属」などを確認することが重要です。"},
    {id:30,category:"法律・ガイドライン",question:"日本の「個人情報保護法」において「個人情報」に該当するものとして最も適切なものを選びなさい。",options:["国土交通省が公表する都道府県別の人口推移データや交通量統計など、個人を特定できない公開統計情報のこと","氏名・住所・生年月日・電話番号・メールアドレスなど、特定の個人を識別できる情報のこと","非上場企業が社内管理している年間売上高・部門別コスト・新製品の開発ロードマップなどの企業内部の財務データのこと","第三者が個人を特定できないよう統計処理・集計したアンケート結果や行動分析データなどの匿名化済み統計情報のこと"],answer:1,explanation:"個人情報保護法における「個人情報」とは、特定の個人を識別できる情報を指します。生成AIに入力する際はこれらの情報を含めないよう注意が必要です。"},
    {id:31,category:"法律・ガイドライン",question:"生成AIによるコンテンツ作成において「著作権侵害」のリスクが特に高い行為として最も適切なものを選びなさい。",options:["業務メールの返信文案を生成させたり、会議の議事録の要約やアジェンダの下書きを作成補助として利用したりすること","有名作家の文体・表現スタイルを意図的に完全模倣した商業小説をAIで生成し、そのまま出版・販売すること","自社製品の仕様書・マニュアル・FAQの文章作成にAIを活用して担当者の確認を経てから社内外に公開すること","プログラムのバグ修正案の提示やコードのリファクタリング提案など、ソフトウェア開発の補助ツールとして利用すること"],answer:1,explanation:"既存の著作権保護された作家の文体や表現を意図的に模倣した作品を商業的に使用・販売することは、著作権侵害リスクが特に高い行為です。"},
    {id:32,category:"法律・ガイドライン",question:"職場でAIを使う際に「就業規則・会社のルール」を確認すべき理由として最も適切なものを選びなさい。",options:["AIはすべての企業・職種・業界で制限なく自由に使用することが法律上保証されており、就業規則との矛盾は生じない","会社ごとに使用可能なAIツール・入力禁止情報・利用目的のルールが定められており、違反すると情報漏洩・規則違反になる","就業規則にはIT機器の使用に関する規定しか含まれておらず、AIサービスの利用はそもそも就業規則の対象外である","会社のルールはAIの利用を全面的に禁止する内容のみであるため、確認しても業務でAI活用できる余地はほとんどない"],answer:1,explanation:"企業によってAIの利用ポリシー（使用可能なツール・機密情報の入力禁止・使用目的の制限など）が定められている場合があります。ルールを確認せずに使用すると、情報漏洩・規則違反・法的問題につながる恐れがあります。"},
    {id:33,category:"法律・ガイドライン",question:"「ステルスマーケティング（ステマ）規制」とAI生成コンテンツの関係として最も適切なものを選びなさい。",options:["AI生成のPRや広告文章はアルゴリズムが作成したコンテンツとして人間の意図とは区別され、ステマ規制の対象外と明確に定められている","AI生成のPR・広告文章であっても、広告であることを明示せず消費者に自然な口コミと誤認させる投稿はステマ規制の対象となる","ステマ規制はテレビCMや雑誌広告など従来型のオフラインメディアにのみ適用され、AIを使ったデジタルコンテンツは対象外","AI生成コンテンツに「#AI作成」「#生成AI使用」のタグをつければステマ規制の要件を完全に満たし、いかなる内容でも問題ない"],answer:1,explanation:"2023年10月施行の景品表示法改正により、広告・PR投稿に「広告」「PR」と明記しないステルスマーケティングが禁止されています。AI生成のコンテンツであっても規制は同様に適用されます。"},
    {id:34,category:"法律・ガイドライン",question:"「プロファイリング」とAIのリスクについて最も適切な説明を選びなさい。",options:["プロファイリングとはAIモデルの処理速度・メモリ使用量・計算効率を計測するためのパフォーマンス計測手法であり倫理的問題はない","AIが個人の行動データを分析してプロファイルを作成し、本人の意思なく差別的な扱いを受けるリスクがある重要な倫理課題","プロファイリングは犯罪捜査・テロ対策を目的とした公権力のみが実施できる行政行為であり民間企業には全面禁止されている","個人の氏名・住所などの基本情報を含まない行動データのみによるプロファイリングには一切のリスクも規制も存在しない"],answer:1,explanation:"プロファイリングとは、AIが個人の行動・属性・傾向を分析して人物像を形成することです。本人の知らないうちに不当な扱いにつながるリスクがあり、GDPRなどで規制対象となっています。"},
    {id:35,category:"プロンプト技術",question:"生成AIへのプロンプト（指示文）の品質が出力に与える影響として最も適切なものを選びなさい。",options:["AIモデルの性能はパラメータ数で決まるため、プロンプトの書き方にかかわらず同じモデルからは常に同品質の出力が得られる","具体的で明確な指示ほど期待に沿った高品質な出力が得られやすく、プロンプトの設計が出力品質の主要な決定要因となる","日本語より英語でプロンプトを書けば出力品質が常に30〜50%向上するという検証済みの定量的なデータが存在する","プロンプトの長さと出力品質は正の相関関係にあり、指示を長く詳細に書けば書くほど必ず良い出力が得られることが保証される"],answer:1,explanation:"プロンプトの質はAIの出力品質に大きく影響します。曖昧な指示より、役割・目的・形式・制約などを具体的に伝えた指示の方が、期待する出力を得やすくなります。"},
    {id:36,category:"プロンプト技術",question:"生成AIに「箇条書きで5つ挙げてください」のように出力形式を指定することの効果として最も適切なものを選びなさい。",options:["出力形式を指定することでAIのGPU使用率が最適化されレスポンス速度が平均40〜60%向上するパフォーマンス改善効果がある","求める形式の出力が得られるため後続の整理・コピー・承認作業が効率化され、業務全体のワークフローがスムーズになる","出力形式の指定はAIのパラメータ設定を書き換え、次回以降の全ユーザーへの出力スタイルを永続的に変更してしまう副作用がある","出力形式を指定するとAIが著作権保護された既存のコンテンツを参照する確率が高まり、著作権侵害のリスクが増大する"],answer:1,explanation:"出力形式を具体的に指定することで、業務に合った形式の出力を得られます。箇条書き・番号つきリスト・表・JSON形式など、後続の作業に合わせた形式指定はプロンプトエンジニアリングの基本テクニックです。"},
    {id:37,category:"プロンプト技術",question:"生成AIに「悪い例」を示すことの効果として最も適切なものを選びなさい。",options:["悪い例を示すことでAIが誤った学習パターンを形成し、そのセッション以降の全出力品質が恒久的に低下してしまうリスクがある","AIが避けるべき表現・スタイル・構成を具体的に理解し、望ましい出力に近づける効果があり良い例との組み合わせで特に有効","悪い例はプロンプトに含めると有害コンテンツのフィルタリング機能が誤作動してAIが正常な回答を拒否するようになる","悪い例を含むプロンプトはAIサービスの利用規約違反として自動検知され、アカウントの一時停止処分の対象となる"],answer:1,explanation:"プロンプトに「このような表現は避けてください（悪い例）」のように示すことで、AIが望ましくない出力パターンを理解し回避できます。良い例と悪い例の両方を示すと出力精度がさらに向上します。"},
    {id:38,category:"プロンプト技術",question:"生成AIへの指示において「背景情報（コンテキスト）」を伝えることの効果として最も適切なものを選びなさい。",options:["背景情報を含めることでリクエストのトークン数が増加しAPIコストが上昇するため、情報は可能な限り省略すべきである","AIが状況・目的・対象読者をより正確に理解できるため、目的に合ったトーン・難易度・内容の回答が得られやすくなる","背景情報として過去の会話履歴や個人データを含めることで、AIのパラメータが自動更新されパーソナライズが永続的に改善される","コンテキストをプロンプトに含めるとAIのコンテキストウィンドウが消費されてしまい、長い回答が生成できなくなってしまう"],answer:1,explanation:"背景情報（コンテキスト）を伝えることで、AIは状況や目的をより正確に理解できます。例えば「新入社員向けの研修資料として」と伝えることで、難易度・トーン・内容が適切に調整されます。"},
    {id:39,category:"プロンプト技術",question:"長い文書を生成AIで要約させる際のコツとして最も適切なものを選びなさい。",options:["文書全体を一度にすべて入力するだけで最善の要約が自動生成されるため、追加の指示や制約を与える必要はまったくない","要約の目的・対象読者・文字数・重視するポイントを明示することで、用途に最適化された高品質な要約が得られやすくなる","文書の内容にかかわらず必ず英語に翻訳してから英語で要約指示を出すことが、すべての言語で最高品質を保証する唯一の手順","1つの長い文書より10個の短い文書に分割してそれぞれ別々に要約依頼する方が、常に高品質な要約が得られることが実証されている"],answer:1,explanation:"要約の品質を上げるには、「何のための要約か（目的）」「誰が読むか（対象読者）」「どのくらいの長さか（文字数）」「何を重視するか（ポイント）」を明示することが効果的です。"},
    {id:40,category:"プロンプト技術",question:"「プロンプトエンジニアリング」とは何か。最も適切なものを選びなさい。",options:["AIシステムのバックエンドAPIやデータパイプラインを設計・構築するためのソフトウェアエンジニアリング専門技術のこと","AIから望む出力を引き出すために指示文（プロンプト）の書き方・構成・表現を工夫・最適化するスキルや手法のこと","AIのハードウェアインフラ（GPU・サーバー・ネットワーク）を効率的に設計・運用するためのインフラエンジニアリング技術のこと","AIシステムへの不正アクセスやプロンプトインジェクション攻撃を防ぐためのセキュリティ設計・防御手法を体系化した技術のこと"],answer:1,explanation:"プロンプトエンジニアリングとは、生成AIから望む出力を得るために、指示文（プロンプト）の書き方・構成・表現を工夫・最適化するスキルや手法のことです。プログラミングの知識なしでも実践できます。"},
    {id:41,category:"業務活用",question:"生成AIを会議の議題案の作成に活用した場合の適切な手順として最も適切なものを選びなさい。",options:["AIが自律的に生成した議題案は毎回の会議の現状・優先課題・参加者の役割を完全に反映した最適内容のため確認不要","AIが生成した議題案を起点として担当者が自社の状況・優先事項・参加者のニーズに合わせて確認・修正・追加して使用する","会議の議題をAIに生成させることは企業の意思決定プロセスへのAI介入にあたり、コーポレートガバナンス上問題がある","AIが作成した議題を参加者に事前共有すると「AIが会議をコントロールしている」という誤解を招くため非公開で使用すべき"],answer:1,explanation:"AI生成の議題案はたたき台として活用し、担当者が自社の状況・優先事項・参加者のニーズに合わせて確認・修正・追加することが重要です。"},
    {id:42,category:"業務活用",question:"生成AIを使った翻訳で特に注意が必要なケースとして最も適切なものを選びなさい。",options:["旅行先の観光スポット案内・レストランのメニュー・交通アクセスの説明など、誤訳があっても影響が軽微な一般情報の翻訳","法的拘束力のある契約書・利用規約・法廷提出書類の翻訳は、法的解釈に影響する専門用語があり専門家の確認が必要","社内で共有する非公式なチャットのやり取りや、プロジェクトの進捗メモなど誤訳しても業務への影響がほぼない軽微な内容","料理レシピ・イベントの招待状・社員旅行のしおりなど、内容の誤りが深刻な影響を及ぼさない軽微な文書の翻訳作業"],answer:1,explanation:"法的拘束力のある契約書・規約の翻訳には、専門用語の微妙なニュアンス・法的解釈への影響があるため、AIの翻訳をそのまま使用することは危険です。必ず専門の翻訳者や法律専門家がレビューする必要があります。"},
    {id:43,category:"業務活用",question:"生成AIで作成した提案書を取引先に提出する前に必ず行うべきこととして最も適切なものを選びなさい。",options:["AIが最新の業界データをもとに生成した提案書は自社製品仕様・価格・実績を正確に反映しているため確認なく提出できる","数値・事実・製品情報・自社のサービス内容などに誤りがないか担当者が確認・修正し責任を持って提出することが必要","取引先に提出する文書にAIを使用したことを書面で事前通知することが日本の商取引慣行として法的に義務付けられている","AI生成の提案書は著作権上の問題から取引先への提出が禁止されており、人間が一から書き直す必要がある"],answer:1,explanation:"AI生成の提案書には数値の誤り・事実誤認・自社製品と異なる情報が含まれる場合があります。提出前に担当者が内容の正確性を確認・修正し、責任を持って提出することが基本です。"},
    {id:44,category:"業務活用",question:"医療現場での生成AI活用において最も適切なものを選びなさい。",options:["AIの診断精度は熟練医師と同等以上と実証されているため、診断補助AIの出力は医師のレビューなしに最終診断として使用できる","AIは文書作成・情報整理・参考情報提供などの補助に活用し、最終的な診断・治療方針の決定は必ず医師が行う体制が必要","患者の医療情報・病歴・処方内容は精度向上のためにクラウドAIへの入力が推奨されており個人情報保護法の適用が除外される","医療分野では安全性確保のためAI活用がすべて禁止されており、診断補助・文書作成・医学文献検索への活用も認められない"],answer:1,explanation:"医療現場でのAI活用では、AIを情報整理・文書作成・参考情報の補助として使い、診断・治療の最終判断は必ず資格を持つ医師が行うことが重要です。"},
    {id:45,category:"業務活用",question:"生成AIを使って社内の問い合わせ対応を自動化する際の注意点として適切でないものを選びなさい。",options:["AIが回答できない専門的・個人的な問い合わせは担当者へエスカレーションできる仕組みを必ず設計に含める","回答精度・ユーザー満足度・誤回答率を定期的にモニタリングし品質改善サイクルを継続的に回す運用体制を整備する","AIは完全に正確な回答を保証できるため導入後のモニタリングや品質確認は不要であり運用コストゼロで自動化が完結する","問い合わせ内容に個人情報・機密情報が含まれる場合の取り扱いルールとデータ保護の方針を事前に明確化しておく"],answer:2,explanation:"AIによる自動対応でも誤回答・対応できない質問・個人情報の取り扱いなどの問題が生じます。定期的なモニタリングと人間へのエスカレーション設計は必須であり、「モニタリング不要」は誤りです。"},
    {id:46,category:"業務活用",question:"生成AIを使って競合他社の製品情報を調査する際の注意点として最も適切なものを選びなさい。",options:["生成AIは競合他社の非公開内部資料・特許出願前の開発情報・財務予測をWebから収集して正確に報告できる高度な調査ツール","AIの回答には古い情報や誤りが含まれる場合があるため、重要な競合情報は公式サイト・IR資料・公官庁データで確認が必要","競合他社の公開情報をAIで調査することは不正競争防止法上の問題行為として法的リスクが生じる可能性がある","AIが生成した競合他社に関する情報は企業機密にあたるため、社内の一部役職者以外への共有が法律上禁止されている"],answer:1,explanation:"AIの競合情報にはカットオフ以降の情報が含まれず、古いデータや誤りが混在する場合があります。重要なビジネス判断に使う情報は、競合他社の公式サイト・IR資料・公官庁データ等の一次ソースで確認してください。"},
    {id:47,category:"業務活用",question:"生成AIをアイデア出し（ブレインストーミング）に活用するメリットとして最も適切なものを選びなさい。",options:["AIが出したアイデアはビッグデータ分析に基づくため市場調査不要で採用すべきものとして確定しており実現性が保証されている","短時間で多様な視点のアイデアを大量生成でき、人間がそれを材料に取捨選択・発展させることで発想の効率化が図れる","AIのアイデアは既存の学習データに基づくため常に過去の模倣に留まり、本当の革新的アイデアは人間にしか生み出せない","AIが生成したアイデアには著作権が発生するため、AIを活用して得たアイデアを事業化する際は特許申請が義務付けられる"],answer:1,explanation:"生成AIはブレインストーミングにおいて、短時間で多様な視点や切り口のアイデアを大量に生成できます。人間がそれを材料に取捨選択・発展させることで、アイデア出しを大幅に効率化できます。"},
    {id:48,category:"業務活用",question:"生成AIでプレゼン資料のスライド構成を作成した後に行うべきこととして最も適切なものを選びなさい。",options:["AIが生成したスライド構成は業界のベストプラクティスを反映した最適設計のため、数値・メッセージの確認なしに使用できる","数値・事実・メッセージの正確性と目的・対象読者への適合性を担当者が確認・修正してから使用することが重要","AI生成の構成をそのまま使用することを上司が承認した場合はその上司がすべての責任を負い、担当者の確認義務はなくなる","スライド構成のAI生成は著作権上グレーゾーンであるため、弁護士による法的確認を毎回取得してから使用する必要がある"],answer:1,explanation:"AIが生成したスライド構成は出発点として活用し、数値・事実の正確性・自社の状況への適合・伝えたいメッセージとの整合性を担当者が確認・修正することが重要です。"},
    {id:49,category:"業務活用",question:"生成AIを使って採用面接の質問を作成する際の注意点として最も適切なものを選びなさい。",options:["AIは採用データから統計的・客観的に最適な質問を生成するため、差別や偏りが介在せず人間の確認なしに使用できる","性別・年齢・家族構成・出身地など差別につながる質問が含まれていないか採用担当者が必ず確認してから使用する","AIが生成した面接質問は法律上の採用差別禁止規定の対象外のため、内容にかかわらず法的リスクなく使用できる","面接質問へのAI活用は就職差別につながるとして厚生労働省が全面禁止する通達を2023年に発令している"],answer:1,explanation:"AIが生成した面接質問には、意図せずに差別的な内容が含まれる場合があります。採用担当者が内容を確認し、不当な差別につながらないか確認してから使用することが重要です。"},
    {id:50,category:"業務活用",question:"生成AIが業務に普及することで新たに重要になるスキルとして最も適切なものを選びなさい。",options:["AIがすべての業務を代替するためビジネスパーソンのスキル開発は無意味となり、余暇・趣味・消費活動への時間投資が最優先","AIへの効果的な指示・出力の批判的評価・AIとの協働で価値を生む「AIリテラシー」が重要なビジネススキルとして浮上する","プログラミングとデータサイエンスのスキルだけがAI時代に唯一価値を持ち、それ以外の文系スキルはすべて不要になる","外国語スキルはAI翻訳で完全代替されるため語学学習は無駄であり、コミュニケーションは翻訳AIに完全依存すべきである"],answer:1,explanation:"AI普及社会では、AIに効果的な指示を出す・出力を批判的に評価する・AIと協働して価値を生み出す「AIリテラシー」が重要なスキルとなります。"},
    {id:51,category:"AIの基礎",question:"「自然言語」とは何か。最も適切なものを選びなさい。",options:["コンピューターに命令を与えるためにPythonやJavaなどの文法規則に従って人工的に設計されたプログラミング言語のこと","人間が日常のコミュニケーションで自然に発展させてきた言語（日本語・英語など）のことで、NLPの処理対象","AIが学習を通じて独自に発展させたベクトル空間上の概念表現であり、人間には直接理解できない内部表現言語のこと","数式・論理記号・集合記号などを使って厳密な推論を行うために設計された数学的・形式的な記号言語体系のこと"],answer:1,explanation:"自然言語とは、人間が日常的なコミュニケーションに使う言語（日本語・英語・中国語など）を指します。プログラミング言語のような人工的に設計された言語とは区別されます。"},
    {id:52,category:"AIの基礎",question:"AIにおける「推論（Inference）」の説明として最も適切なものを選びなさい。",options:["AIが大量の学習データを使ってモデル内部のパラメータを繰り返し更新・最適化していく学習・訓練フェーズのプロセス","学習済みのAIモデルが新しい入力データに対して予測・分類・生成などの出力を行う本番運用フェーズのプロセスのこと","AIがインターネット上のWebサイトをクロールして最新のデータを収集・インデックス化するデータ取得プロセスのこと","AIが複数の異なる言語の間でテキストを自動変換・翻訳する際の内部処理プロセスや言語間マッピングのこと"],answer:1,explanation:"推論（Inference）とは、学習済みのAIモデルが新しい入力データに対して予測・分類・生成などの出力を行うプロセスです。ユーザーがChatGPTに質問して回答を得ることも「推論」の一例です。"},
    {id:53,category:"生成AI",question:"生成AIの出力のランダム性を制御する「Temperature（温度）」について正しい説明を選びなさい。",options:["値を高く設定するほど出力が安定・一貫し同じ入力に対して毎回同じ回答が返ってきやすく、低いほど創造的になる","値を低く設定するほど出力が安定・一貫し、高いほど多様で創造的な出力が得られるが同時にランダム性も増す","Temperatureとはモデルが1秒間に処理できるトークン数の上限を設定するスループット制御パラメータである","Temperatureを変更するとモデルのパラメータが書き換えられ、次回の全ユーザーの出力にも影響が波及する"],answer:1,explanation:"Temperatureは低い値（0に近い）ほど出力が安定・一貫し、高い値ほど多様・創造的（ランダム性が高い）になります。文書の正確な要約には低温度を、創作・アイデア出しには高温度が適します。"},
    {id:54,category:"倫理・リスク",question:"AIによる意思決定が不当であると感じた場合の利用者の権利として最も適切なものを選びなさい。",options:["AIの判断はアルゴリズムによる客観的な処理結果であり、感情的・主観的な理由で異議を唱える権利は法律上存在しない","GDPRなどの規制では自動化された意思決定への説明要求権・人間による再審査を求める権利が認められている場合がある","AIに関する不満や苦情はAI開発を行う技術者にのみ申告できる仕組みとなっており、一般的な法的手続きの対象にならない","AIの判断は一度下されると覆せない最終決定であり、いかなる状況でも変更・修正・不服申し立ては技術的に不可能である"],answer:1,explanation:"GDPRなどの規制では、完全に自動化された意思決定（採用・融資等）に対して説明を求める権利・人間による再審査を求める権利を認めています。"},
    {id:55,category:"倫理・リスク",question:"「人間の監督（ヒューマンオーバーサイト）」が特に重要な場面として最も適切なものを選びなさい。",options:["スマートフォンのアシスタントAIが天気予報を音声で読み上げたり、カレンダーのリマインダー通知を送ったりする場面","採用・融資・医療診断など個人の人生や権利に大きく影響する重要な意思決定をAIが支援・補助する場面","地図アプリのAIが現在地から目的地までの最短ルートを探索して案内する場面","ゲームアプリのAIが対戦相手の難易度を自動調整したり、ヒントを表示したりするインゲームアシスト機能の場面"],answer:1,explanation:"採用・融資・医療診断など個人の権利や生活に大きく影響する判断においては、AIの誤りやバイアスが深刻な被害につながるため、人間による最終確認・監督が特に重要です。"},
    {id:56,category:"法律・ガイドライン",question:"「AI生成コンテンツの開示」について現在の動向として最も適切なものを選びなさい。",options:["AI生成コンテンツの開示義務は2024年の国際条約によって完全に廃止され、現在はどの国・分野でも開示を求める規制は存在しない","特定の分野や国でAI生成コンテンツの開示を求める規制・ガイドラインが整備されつつあるが全世界的な統一義務はない","すべての国でAI生成のあらゆるコンテンツに対し正式文書への明記が義務付けられ、違反した場合の罰金も統一されている","AI生成コンテンツを開示することは競合他社へのAI活用状況の流出につながるため、多くの国で法律上禁止されている"],answer:1,explanation:"EU AI法・各国の選挙関連規制・学術機関のガイドラインなど、特定の分野や国でAI生成コンテンツの開示を求める規制・ガイドラインが整備されています。ただし全世界的に統一された義務はまだ存在しません。"},
    {id:57,category:"法律・ガイドライン",question:"社内でAI活用中にインシデント（情報漏洩の疑い等）が発生した場合の対応として最も適切なものを選びなさい。",options:["インシデントの情報が拡散すると会社の評判が傷つくため、事実確認が100%完了するまで上司・担当部署には報告しない","定めたルールに従い速やかに上司・情報セキュリティ担当に報告・相談し初動対応の速さで被害を最小化することが重要","AI関連インシデントはAIサービスを提供する外部ベンダーの技術的ミスが原因であるため、対応はすべてベンダーに委託する","インシデントが実際の情報漏洩に発展した場合のみ報告義務が生じ、漏洩に至っていない疑い段階では報告は不要である"],answer:1,explanation:"AI活用中にインシデントが疑われる場合は、事前に定めたルールに従い、速やかに上司・情報セキュリティ担当に報告・相談することが重要です。初動対応の速さが被害を最小化します。"},
    {id:58,category:"生成AIの動向",question:"「生成AIのAPIコスト」について最も正しい説明を選びなさい。",options:["APIを通じた生成AI利用はすべて月額均一の定額制であり、利用量の多少にかかわらず同じ料金が請求される仕組み","APIを通じた業務利用では処理したトークン数（入力・出力の文字量）に応じた従量課金が一般的で利用量でコストが変動する","生成AIのAPIは研究・教育・非営利目的に分類されれば自動的に無料になる仕組みで、商用目的のみ有料となっている","APIの料金はモデルのパラメータ数のみで決まり、実際の処理量・トークン数・使用頻度はまったく課金に影響しない"],answer:1,explanation:"生成AIをAPIで業務利用する場合、処理したトークン数（入力・出力の文字量）に応じた従量課金が一般的です。利用量に応じてコストが変動するため、コスト管理・最適化が業務活用において重要な考慮点です。"},
    {id:59,category:"業務活用",question:"生成AIを長期的に業務で活用するために組織として取り組むべきこととして最も適切なものを選びなさい。",options:["AIは一度導入すれば技術・リスク・規制が変化しても同じ運用を継続でき、追加コストや見直しは発生しないシステムである","利用状況のモニタリング・ルールの定期見直し・技術変化への対応・従業員への継続教育を繰り返す継続的改善が不可欠である","AIの活用効果は導入3ヶ月で完全に確定するため、それ以降の効果測定・改善活動はコストパフォーマンスの観点から不要","AI活用は特定の技術部門やIT部門にのみ担わせ、営業・人事・マーケティング部門は関与しない集中管理が最も効率的"],answer:1,explanation:"生成AIの技術・リスク・規制環境は急速に変化しています。長期的な効果を維持するには、利用状況のモニタリング・ルールの定期見直し・新機能への対応・従業員への継続教育が不可欠です。"},
    {id:60,category:"まとめ",question:"生成AI活用の基本姿勢として最もふさわしいものを選びなさい。",options:["AIが自律的に生成した成果物の品質・正確性・法的適合性にはAI開発企業が全責任を負い、利用者は確認義務を持たない","AIの能力と限界を理解した上で補助ツールとして活用し、最終判断・確認・成果物への責任は人間が持つことが基本姿勢","AIは人間より高い判断精度を持つためすべての業務判断をAIに委ね、人間は結果の実行作業のみを担当することが最善策","AI活用には高度な理系・技術系のスキルが必須であるため一般のビジネスパーソンには使いこなすことが根本的に不可能"],answer:1,explanation:"生成AI活用の基本姿勢は「AIを補助ツールとして使い、最終判断・確認・責任は人間が持つ」ことです。AIの能力（効率化・アイデア出し・下書き生成等）を最大限に活かしながら、その限界を理解して適切に管理することが重要です。"}
  ];

  // ---- state ----
  var state = {
    wrongIds: [],
    queue: allQuestions.slice(),
    answers: [],
    current: 0,
    selected: null,
    answered: false,
    score: 0,
    showResult: false,
    timeLeft: 3600,
    isReview: false,
    timerId: null
  };

  var root = document.getElementById('quiz-root');

  function fmt(s) {
    var m = Math.floor(s / 60);
    var sec = s % 60;
    return m + ":" + (sec < 10 ? "0" : "") + sec;
  }

  function startTimer() {
    if (state.timerId) clearInterval(state.timerId);
    state.timerId = setInterval(function() {
      if (state.showResult) { clearInterval(state.timerId); return; }
      state.timeLeft--;
      if (state.timeLeft <= 0) {
        state.timeLeft = 0;
        state.showResult = true;
        clearInterval(state.timerId);
      }
      render();
    }, 1000);
  }

  function handleAnswer(idx) {
    if (state.answered || state.queue.length === 0) return;
    state.answers[state.current] = idx;
    state.selected = idx;
    state.answered = true;
    render();
  }

  function syncAnswer() {
    var saved = state.answers[state.current];
    state.selected = typeof saved === 'number' ? saved : null;
    state.answered = typeof saved === 'number';
  }

  function calcResult() {
    var score = 0;
    var wrong = [];
    state.queue.forEach(function(q, index) {
      if (state.answers[index] === q.answer) score++;
      else wrong.push(q.id);
    });
    state.score = score;
    state.wrongIds = wrong;
  }

  function nextQuestion() {
    if (!state.answered) return;
    if (state.current < state.queue.length - 1) {
      state.current++;
      syncAnswer();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      calcResult();
      state.showResult = true;
      if (state.timerId) clearInterval(state.timerId);
    }
    render();
  }

  function prevQuestion() {
    if (state.current <= 0) return;
    state.current--;
    syncAnswer();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    render();
  }

  function startReview() {
    var rq = allQuestions.filter(function(q) { return state.wrongIds.indexOf(q.id) !== -1; });
    state.queue = rq;
    state.answers = [];
    state.current = 0;
    state.selected = null;
    state.answered = false;
    state.score = 0;
    state.showResult = false;
    state.isReview = true;
    state.wrongIds = [];
    startTimer();
    render();
  }

  function resetAll() {
    state.wrongIds = [];
    state.queue = allQuestions.slice();
    state.answers = [];
    state.current = 0;
    state.selected = null;
    state.answered = false;
    state.score = 0;
    state.showResult = false;
    state.timeLeft = 3600;
    state.isReview = false;
    startTimer();
    render();
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function renderResult() {
    calcResult();
    var pct = Math.round((state.score / state.queue.length) * 100);
    var pass = pct >= 75;
    var html = '';
    html += '<div class="result-card">';
    html += '<div style="font-size:48px;margin-bottom:8px;">' + (pass ? '🏆' : '📘') + '</div>';
    html += '<div class="result-title">' + (state.isReview ? '復習完了！' : '試験終了') + '</div>';
    html += '<div class="result-score">スコア：<b class="' + (pass ? 'pct-pass' : 'pct-fail') + '">' + state.score + '</b> / ' + state.queue.length + '問</div>';
    html += '<div style="font-size:18px;font-weight:700;margin-bottom:8px;" class="' + (pass ? 'pct-pass' : 'pct-fail') + '">' + pct + '点</div>';
    html += '<div class="result-msg ' + (pass ? 'msg-pass' : 'msg-fail') + '">' + (pass ? '合格ライン（75点）達成！' : '復習して再挑戦しましょう') + '</div>';
    html += '<div class="bar-track"><div class="bar-fill" style="background:' + (pass ? '#16a34a' : '#f59e0b') + ';width:' + pct + '%;"></div></div>';
    if (state.wrongIds.length > 0 && !state.isReview) {
      html += '<div class="wrong-box"><p style="margin:0;font-weight:700;color:#854d0e;font-size:15px;">間違えた問題：' + state.wrongIds.length + '問</p>';
      html += '<p style="margin:4px 0 0;color:#92400e;font-size:14px;">復習モードで間違えた問題だけを再出題します。</p></div>';
    }
    html += '<div class="btn-row">';
    if (state.wrongIds.length > 0 && !state.isReview) {
      html += '<button class="btn-secondary" id="btn-review">🔄 間違い問題を復習</button>';
    }
    html += '<button class="btn-primary" id="btn-reset">↺ 最初からやり直す</button>';
    html += '</div></div>';
    root.innerHTML = html;
    var br = document.getElementById('btn-review');
    if (br) br.onclick = startReview;
    document.getElementById('btn-reset').onclick = resetAll;
  }

  function render() {
    if (state.showResult) { renderResult(); return; }
    if (state.queue.length === 0) { root.innerHTML = '<div class="loading">読み込み中...</div>'; return; }

    var q = state.queue[state.current];
    syncAnswer();
    var pctProgress = Math.round(((state.current + 1) / state.queue.length) * 100);
    var timerCls = state.timeLeft < 300 ? 'timer-warn' : '';

    var html = '<div class="badge-bar"><span>Vol.5 本番レベル（合格基準：75点以上）</span>';
    if (state.isReview) html += '<span class="review-tag">復習モード中</span>';
    html += '</div>';

    html += '<div class="card">';
    html += '<div class="top-row">';
    html += '<div class="q-counter">📖 問 ' + (state.current + 1) + ' / ' + state.queue.length + '</div>';
    html += '<div class="timer-box">⏱ <span class="timer-text ' + timerCls + '">' + fmt(state.timeLeft) + '</span></div>';
    html += '</div>';

    html += '<div class="progress-track"><div class="progress-fill" style="width:' + pctProgress + '%;"></div></div>';
    html += '<span class="cat-tag">' + esc(q.category) + '</span>';
    html += '<p class="q-text">' + esc(q.question) + '</p>';

    html += '<div class="opt-list">';
    for (var i = 0; i < q.options.length; i++) {
      var cls = 'opt-btn';
      if (state.answered) {
        cls += ' answered';
        if (i === q.answer) cls += ' opt-correct';
        else if (i === state.selected) cls += ' opt-wrong';
        else cls += ' opt-dim';
      }
      html += '<button class="' + cls + '" data-idx="' + i + '" ' + (state.answered ? 'disabled' : '') + '>';
      html += '<span class="opt-letter">' + String.fromCharCode(65 + i) + '</span>';
      html += '<span class="opt-text">' + esc(q.options[i]) + '</span>';
      html += '</button>';
    }
    html += '</div>';

    if (state.answered) {
      var isCorrect = state.selected === q.answer;
      html += '<div class="explain-box ' + (isCorrect ? 'explain-correct' : 'explain-wrong') + '">';
      html += '<div class="explain-head" style="color:' + (isCorrect ? '#16a34a' : '#dc2626') + ';">';
      html += (isCorrect ? '✅ 正解です！' : '❌ 不正解です') + '</div>';
      html += '<p class="explain-body"><strong>解説：</strong>' + esc(q.explanation) + '</p>';
      html += '</div>';
    }

    html += '</div><nav class="bottom-nav" aria-label="問題移動">';
    html += '<button class="nav-btn nav-prev" id="btn-prev" type="button" ' + (state.current === 0 ? 'disabled' : '') + '>前へ</button>';
    html += '<button class="nav-btn nav-next" id="btn-next" type="button" ' + (!state.answered ? 'disabled' : '') + '>' + (state.current === state.queue.length - 1 ? '結果を見る' : '次へ') + '</button>';
    html += '</nav>';
    root.innerHTML = html;

    var optBtns = root.querySelectorAll('.opt-btn');
    optBtns.forEach(function(btn) {
      btn.onclick = function() {
        handleAnswer(parseInt(this.getAttribute('data-idx'), 10));
      };
    });
    document.getElementById('btn-prev').onclick = prevQuestion;
    document.getElementById('btn-next').onclick = nextQuestion;
  }

  // init
  startTimer();
  render();
})();
</script>
</body>
</html>
