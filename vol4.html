<!DOCTYPE html>
<html lang="ja">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成AI活用検定 模擬試験 Vol.4</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif;
    color: #1e293b;
    background: #f0fdf4;
    min-height: 100vh;
    padding: 12px 12px 0;
    overflow-x: hidden;
  }
  body.scroll-room { padding-bottom: calc(72px + env(safe-area-inset-bottom)); }
  .quiz-wrap { max-width: 720px; margin: 0 auto; }
  .badge-bar {
    background: #dcfce7; border: 1px solid #86efac; border-radius: 10px;
    padding: 8px 14px; margin-bottom: 14px; font-size: 13px; font-weight: 700;
    color: #166534; display: flex; justify-content: space-between; align-items: center;
  }
  .review-tag { background: #fef3c7; color: #92400e; padding: 2px 10px; border-radius: 6px; }
  .card { background: #f8fafc; border-radius: 20px; box-shadow: 0 2px 24px rgba(0,0,0,0.06); padding: 22px 18px; }
  .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .q-counter { display: flex; align-items: center; gap: 8px; color: #64748b; font-weight: 600; }
  .timer-box { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: #fff; border-radius: 99px; border: 1px solid #e2e8f0; }
  .timer-text { font-family: monospace; font-weight: 700; font-size: 16px; color: #334155; }
  .timer-warn { color: #ef4444 !important; }
  .progress-track { width: 100%; background: #e2e8f0; border-radius: 99px; height: 4px; margin-bottom: 16px; }
  .progress-fill { background: #16a34a; border-radius: 99px; height: 4px; transition: width .3s; }
  .cat-tag { display: inline-block; padding: 4px 12px; background: #dcfce7; color: #166534; font-size: 12px; font-weight: 700; border-radius: 6px; margin-bottom: 10px; letter-spacing: 1px; }
  .q-text { font-size: 17px; font-weight: 700; line-height: 1.75; margin: 0 0 18px; color: #1e293b; }
  .opt-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; }
  .opt-btn {
    width: 100%; min-height: 64px; text-align: left; padding: 16px; border-radius: 16px;
    border: 2px solid #e2e8f0; background: #fff; cursor: pointer; transition: all .18s;
    display: flex; align-items: flex-start; gap: 12px; font-family: inherit; font-size: 15px;
    touch-action: manipulation;
  }
  .opt-btn:hover:not([disabled]), .opt-btn:focus-visible { border-color: #86efac; outline: none; box-shadow: 0 0 0 4px rgba(134,239,172,0.28); }
  .opt-letter {
    width: 28px; height: 28px; border-radius: 50%; background: #f1f5f9; color: #64748b;
    display: flex; align-items: center; justify-content: center; font-weight: 700;
    flex-shrink: 0; font-size: 13px;
  }
  .opt-text { font-size: 16px; line-height: 1.65; color: #1e293b; }
  .opt-correct { border-color: #22c55e !important; background: #f0fdf4 !important; }
  .opt-correct .opt-letter { background: #22c55e; color: #fff; }
  .opt-wrong { border-color: #ef4444 !important; background: #fef2f2 !important; }
  .opt-dim { opacity: 0.5; }
  .explain-box { padding: 18px 20px; border-radius: 14px; }
  .explain-correct { background: #f0fdf4; border: 1px solid #bbf7d0; }
  .explain-wrong { background: #fef2f2; border: 1px solid #fecaca; }
  .explain-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-weight: 700; font-size: 16px; }
  .explain-body { margin: 0 0 14px; line-height: 1.8; color: #374151; font-size: 15px; }
  .bottom-nav {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    padding: 8px max(12px, env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-right));
    background: rgba(240,253,244,0.96); border-top: 1px solid #bbf7d0;
    box-shadow: 0 -8px 24px rgba(15,23,42,0.08);
  }
  .nav-btn {
    min-height: 46px; border: none; border-radius: 14px; font-family: inherit;
    font-size: 16px; font-weight: 800; cursor: pointer; touch-action: manipulation;
  }
  .nav-prev { background: #fff; color: #166534; border: 1px solid #86efac; }
  .nav-next { background: #16a34a; color: #fff; }
  .nav-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .nav-btn:focus-visible { outline: 3px solid rgba(22,163,74,0.35); outline-offset: 2px; }
  .result-card { max-width: 600px; margin: 24px auto; padding: 40px 32px; background: #fff; border-radius: 20px; box-shadow: 0 4px 32px rgba(0,0,0,0.08); text-align: center; }
  .result-title { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .result-score { font-size: 18px; margin-bottom: 8px; }
  .result-score b { font-size: 36px; font-weight: 800; }
  .pct-pass { color: #16a34a; }
  .pct-fail { color: #f59e0b; }
  .result-msg { font-size: 15px; font-weight: 700; margin-bottom: 24px; padding: 10px 20px; border-radius: 10px; display: inline-block; }
  .msg-pass { color: #166534; background: #dcfce7; }
  .msg-fail { color: #991b1b; background: #fee2e2; }
  .bar-track { background: #e5e7eb; border-radius: 99px; height: 14px; margin-bottom: 28px; }
  .bar-fill { border-radius: 99px; height: 14px; transition: width 1s; }
  .wrong-box { background: #fef9c3; border: 1px solid #fde047; border-radius: 12px; padding: 14px 18px; margin-bottom: 20px; text-align: left; }
  .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-primary, .btn-secondary { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-secondary { background: #f59e0b; }
  .btn-primary { background: #16a34a; }
  .back-link { display: block; text-align: center; margin-bottom: 12px; color: #64748b; font-size: 13px; text-decoration: none; }
  .back-link:hover { color: #16a34a; }
  @media (max-width: 520px) {
    body { padding: 8px 8px 0; }
    body.scroll-room { padding-bottom: calc(68px + env(safe-area-inset-bottom)); }
    .back-link { margin-bottom: 6px; font-size: 12px; }
    .badge-bar { align-items: flex-start; gap: 8px; padding: 6px 9px; margin-bottom: 8px; font-size: 12px; }
    .card { border-radius: 14px; padding: 14px 12px; }
    .top-row { align-items: flex-start; gap: 8px; margin-bottom: 10px; }
    .q-counter { font-size: 14px; }
    .timer-box { padding: 6px 10px; }
    .progress-track { margin-bottom: 10px; }
    .cat-tag { margin-bottom: 8px; }
    .q-text { font-size: 15px; line-height: 1.58; margin-bottom: 12px; }
    .opt-list { gap: 8px; margin-bottom: 12px; }
    .opt-btn { min-height: 52px; padding: 11px 12px; gap: 9px; border-radius: 13px; }
    .opt-letter { width: 26px; height: 26px; font-size: 12px; }
    .opt-text { font-size: 14px; line-height: 1.45; }
    .explain-box { padding: 12px; }
    .explain-body { font-size: 14px; line-height: 1.55; }
    .bottom-nav { gap: 8px; padding-inline: 10px; }
  }
</style>
</head>

<script>
(function(){
var Q=[
  {id:1,category:"AIの基礎",question:"AI（人工知能）の説明として最も適切なものを選びなさい。",options:["人間と同じ感情や意識を持つコンピューターシステムのこと","人間の知的な作業（学習・推論・判断など）をコンピューターで模倣する技術の総称","インターネット上のデータを収集・整理するだけのプログラム","物理的な作業を自動化するロボット技術全般のこと"],answer:1,explanation:"AIとは、人間の知的活動（学習・推論・問題解決・判断など）をコンピューターで模倣・実現する技術の総称です。感情や意識を持つわけではなく、ロボット工学とも区別されます。"},
  {id:2,category:"AIの基礎",question:"機械学習の手法のうち、正解ラベルを与えずにデータのパターンや構造をモデル自身が発見する手法を何というか。",options:["教師あり学習","教師なし学習","強化学習","転移学習"],answer:1,explanation:"教師なし学習は、正解データ（ラベル）を与えずにデータのパターンや構造をAI自身が発見する手法です。クラスタリングや次元削減がその代表例です。"},
  {id:3,category:"AIの基礎",question:"ディープラーニング（深層学習）の説明として最も適切なものを選びなさい。",options:["人間が手動でルールを記述するプログラミング手法","人間の脳神経回路を模した多層のニューラルネットワークを用いた機械学習の手法","インターネット検索を高速化するアルゴリズム","テキストデータを翻訳するための専用プログラム"],answer:1,explanation:"ディープラーニングは、人間の神経細胞のつながりを模した多層のニューラルネットワークを使い、データから自動的に特徴を学習する機械学習の一手法です。"},
  {id:4,category:"AIの基礎",question:"AIが学習に使われなかった新しいデータに対しても正確に予測・対応できる能力を何というか。",options:["過学習","汎化","強化","転移"],answer:1,explanation:"汎化とは、学習データ以外の未知のデータにも正確に対応できる能力です。汎化能力が低い状態を「過学習（オーバーフィッティング）」と呼びます。"},
  {id:5,category:"AIの基礎",question:"AIの歴史において、専門家の知識をルールとして記述し推論を行う「エキスパートシステム」が注目されたのはどの時代か。",options:["第一次AIブーム（1950〜60年代）","第二次AIブーム（1980年代）","第三次AIブーム（2010年代〜）","2020年代以降"],answer:1,explanation:"第二次AIブーム（主に1980年代）では、専門家の知識をルールとして記述し推論を行う「エキスパートシステム」が注目されました。"},
  {id:6,category:"生成AI",question:"生成AIの説明として最も適切なものを選びなさい。",options:["入力されたデータを分類・予測するだけのAI","テキスト・画像・音声・動画などのコンテンツを新たに生成できるAI","データベースを高速に検索するためのAI","工場の生産ラインを制御するAI"],answer:1,explanation:"生成AI（Generative AI）は、学習したデータをもとにテキスト・画像・音声・動画・コードなど新しいコンテンツを生成できるAIです。ChatGPT・Gemini・DALL-Eなどが代表例です。"},
  {id:7,category:"生成AI",question:"大規模言語モデル（LLM）において用いられているアーキテクチャとして最も適切なものを選びなさい。",options:["RNNのみ","CNN（畳み込みニューラルネットワーク）","トランスフォーマー（Transformer）","決定木"],answer:2,explanation:"現代の大規模言語モデル（GPT・Gemini・Claude等）はトランスフォーマー（Transformer）アーキテクチャを採用しています。"},
  {id:8,category:"生成AI",question:"生成AIが事実と異なる情報をもっともらしく生成してしまう現象を何というか。",options:["オーバーフィッティング","ハルシネーション（幻覚）","ファインチューニング","プロンプトインジェクション"],answer:1,explanation:"ハルシネーション（Hallucination）は、AIが学習データに存在しない情報を「もっともらしい文章」として生成してしまう現象です。"},
  {id:9,category:"生成AI",question:"テキスト生成AIにできないこととして最も適切なものを選びなさい。",options:["文章の要約","プログラムコードの生成","常に100%正確な情報の提供","アイデアのブレインストーミング支援"],answer:2,explanation:"テキスト生成AIはハルシネーションにより誤った情報を生成する場合があり、常に100%正確な情報を提供することはできません。"},
  {id:10,category:"生成AI",question:"生成AIが一度に処理できるテキストの量（入力と出力の合計）の上限を表す概念として最も適切なものを選びなさい。",options:["パラメータ数","コンテキストウィンドウ","温度（Temperature）","トークン"],answer:1,explanation:"コンテキストウィンドウとは、AIが一度の処理で参照できるテキストの量（トークン数）の上限です。"},
  {id:11,category:"生成AI",question:"画像生成AIの代表的な手法で、「生成器」と「識別器」を競わせることで本物らしい画像を生成する仕組みを何というか。",options:["VAE（変分オートエンコーダー）","GAN（敵対的生成ネットワーク）","拡散モデル","CNN"],answer:1,explanation:"GAN（Generative Adversarial Network）は、本物らしいデータを生成する「生成器」と本物か偽物かを見分ける「識別器」が互いに競うことで、高品質な画像などを生成する仕組みです。"},
  {id:12,category:"生成AI",question:"Stable DiffusionやDALL-Eで使われている、ノイズから徐々に画像を復元する画像生成の手法を何というか。",options:["GAN（敵対的生成ネットワーク）","強化学習","拡散モデル（Diffusion Model）","決定木"],answer:2,explanation:"拡散モデル（Diffusion Model）は、ランダムなノイズから少しずつ画像を復元（生成）していく手法です。"},
  {id:13,category:"生成AIの動向",question:"ChatGPTを開発・提供している企業はどれか。",options:["Google","Microsoft","OpenAI","Meta"],answer:2,explanation:"ChatGPTはOpenAIが開発・提供しています。MicrosoftはOpenAIに多額投資しており、Copilotなど自社製品に統合しています。"},
  {id:14,category:"生成AIの動向",question:"テキスト・画像・音声など複数の種類のデータを扱える生成AIの特性を何というか。",options:["マルチエージェント","マルチモーダル","ファインチューニング","フェデレーテッドラーニング"],answer:1,explanation:"マルチモーダルとは、テキスト・画像・音声・動画など複数の形式のデータを統合的に処理できる特性です。"},
  {id:15,category:"生成AIの動向",question:"生成AIを特定の業務や専門分野に特化させるために、追加のデータで再学習させる手法を何というか。",options:["プロンプトエンジニアリング","ハルシネーション","ファインチューニング","RAG"],answer:2,explanation:"ファインチューニングは、事前学習済みのモデルに特定のドメインや業務のデータを追加学習させ、その分野に特化した性能を引き出す手法です。"},
  {id:16,category:"生成AIの動向",question:"外部のデータベースや文書を参照して回答を生成する技術を何というか。",options:["ファインチューニング","RAG（検索拡張生成）","GAN","強化学習"],answer:1,explanation:"RAG（Retrieval-Augmented Generation）は、AIが回答を生成する際に外部のデータベースや文書を動的に検索・参照する技術です。"},
  {id:17,category:"生成AIの動向",question:"生成AIを活用して自律的に複数のタスクを実行するシステムを何というか。",options:["チャットボット","AIエージェント","検索エンジン","ルールベースシステム"],answer:1,explanation:"AIエージェントは、目標に向かってタスクの計画・実行・ツール呼び出しなどを自律的に行うシステムです。"},
  {id:18,category:"情報リテラシー",question:"生成AIを業務で利用する際、入力してはいけない情報として最も適切なものを選びなさい。",options:["業務効率化のアイデア","顧客の個人情報や社内の機密情報","一般的な質問や調査依頼","文章の校正依頼"],answer:1,explanation:"クラウド型の生成AIサービスに個人情報・社内機密・未公開情報を入力すると、データが外部サーバーに送信され情報漏洩リスクが生じます。"},
  {id:19,category:"情報リテラシー",question:"生成AIの出力結果の扱い方として最も適切なものを選びなさい。",options:["AIの出力は常に正確なので、そのまま使用してよい","出力内容は必ず人間が確認・検証した上で使用する","AIが生成した文章には著作権がないので自由に転載できる","生成AIの出力結果を他人に見せることは違法である"],answer:1,explanation:"生成AIはハルシネーション（誤情報の生成）が起きる場合があります。出力結果は必ず人間が内容を確認・検証してから使用することが重要です。"},
  {id:20,category:"情報リテラシー",question:"AIが生成した偽の動画や音声など、本物そっくりに合成されたコンテンツを何というか。",options:["フィッシング","ディープフェイク","マルウェア","スパム"],answer:1,explanation:"ディープフェイクは、AIを使って実在の人物の顔・声・動作を本物そっくりに合成した偽コンテンツです。"},
  {id:21,category:"情報リテラシー",question:"ディープフェイク技術に関して不適切な記述を選びなさい。",options:["特定人物の顔を映像に合成することができる","悪用されると詐欺やなりすましのリスクが高まる","高度なディープフェイクはAI技術でも真偽を見分けられない場合がある","現在すべての国で法律により厳格に規制されている"],answer:3,explanation:"ディープフェイクの規制は国・地域によって異なり、「すべての国で厳格に規制されている」は誤りです。"},
  {id:22,category:"情報リテラシー",question:"生成AIを利用する際のフェイクニュース対策として最も適切なものを選びなさい。",options:["AIが生成した情報は信頼性が高いのでそのまま拡散してよい","情報の発信元や一次ソースを必ず確認してから共有する","フォロワーが多いアカウントの情報は正確である","生成AIの出力結果にはすべて著作権がある"],answer:1,explanation:"フェイクニュース対策の基本は、情報の発信元（一次ソース）を確認することです。"},
  {id:23,category:"倫理・リスク",question:"AIが学習データに含まれる偏りを反映し、特定のグループに不公平な結果を出す問題を何というか。",options:["過学習","AIバイアス","ハルシネーション","プロンプトインジェクション"],answer:1,explanation:"AIバイアスとは、学習データに含まれる社会的偏見や偏りをAIが学習し、特定の性別・人種・年齢などのグループに対して不公平な判断をしてしまう問題です。"},
  {id:24,category:"倫理・リスク",question:"生成AIに悪意ある指示を埋め込んでAIの動作を意図的に操作する攻撃手法を何というか。",options:["フィッシング","プロンプトインジェクション","ランサムウェア","DoS攻撃"],answer:1,explanation:"プロンプトインジェクションとは、悪意ある指示をAIへの入力に埋め込み、AIの本来の動作を乗っ取る攻撃手法です。"},
  {id:25,category:"倫理・リスク",question:"AIの判断や処理過程が人間に理解・説明できる性質を何というか。",options:["汎化性","説明可能性（Explainability）","転移学習","強化学習"],answer:1,explanation:"説明可能性（Explainability）とは、AIがなぜそのような判断や出力を行ったかを人間が理解・説明できる性質です。"},
  {id:26,category:"倫理・リスク",question:"AIシステムの運用において「人間が最終的な判断・確認を行う」考え方を何というか。",options:["完全自動化","ヒューマン・イン・ザ・ループ","ブラックボックス化","オートパイロット"],answer:1,explanation:"ヒューマン・イン・ザ・ループ（Human in the Loop）とは、AIの判断・出力に対して人間が監督・確認・修正を行う仕組みです。"},
  {id:27,category:"倫理・リスク",question:"生成AIが作成した画像や文章で著作権侵害リスクが生じる可能性があるのはどのような場合か。",options:["完全にオリジナルなアイデアを生成させた場合","学習データに含まれる著作物に酷似したコンテンツが生成された場合","業務効率化のための文書を作成した場合","一般的な質問に回答させた場合"],answer:1,explanation:"生成AIが学習データに含まれる著作物に酷似したコンテンツを出力した場合、著作権侵害リスクが生じる可能性があります。"},
  {id:28,category:"倫理・リスク",question:"「責任あるAI（Responsible AI）」の原則に含まれないものを選びなさい。",options:["公平性","透明性","説明責任","企業利益の最大化"],answer:3,explanation:"責任あるAIの原則には公平性・透明性・説明責任・プライバシー保護・安全性などが含まれます。企業利益の最大化は経営目標であり、倫理原則には含まれません。"},

var state={wrongIds:[],queue:Q.slice(),answers:[],current:0,selected:null,answered:false,score:0,showResult:false,timeLeft:3600,isReview:false,timerId:null};
var root=document.getElementById('quiz-root');

function fmt(s){return Math.floor(s/60)+":"+(s%60<10?"0":"")+s%60;}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function startTimer(){
  if(state.timerId)clearInterval(state.timerId);
  state.timerId=setInterval(function(){
    if(state.showResult){clearInterval(state.timerId);return;}
    state.timeLeft--;
    if(state.timeLeft<=0){state.timeLeft=0;state.showResult=true;clearInterval(state.timerId);}
    render();
  },1000);
}

function handleAnswer(idx){
  if(state.answered||!state.queue.length)return;
  state.answers[state.current]=idx;
  state.selected=idx;state.answered=true;
  render();
}

function syncAnswer(){
  var saved=state.answers[state.current];
  state.selected=typeof saved==='number'?saved:null;
  state.answered=typeof saved==='number';
}

function calcResult(){
  var score=0,wrong=[];
  state.queue.forEach(function(q,i){
    if(state.answers[i]===q.answer)score++;
    else wrong.push(q.id);
  });
  state.score=score;
  state.wrongIds=wrong;
}

function updateScrollRoom(){
  document.body.classList.remove('scroll-room');
  window.requestAnimationFrame(function(){
    var nav=document.querySelector('.bottom-nav');
    if(!nav)return;
    var navH=nav.offsetHeight||64;
    var contentH=document.documentElement.scrollHeight;
    if(contentH>window.innerHeight-navH)document.body.classList.add('scroll-room');
  });
}

function nextQ(){
  if(!state.answered)return;
  if(state.current<state.queue.length-1){state.current++;syncAnswer();window.scrollTo({top:0,behavior:'smooth'});}
  else{calcResult();state.showResult=true;clearInterval(state.timerId);}
  render();
}

function prevQ(){
  if(state.current<=0)return;
  state.current--;syncAnswer();window.scrollTo({top:0,behavior:'smooth'});
  render();
}

function startReview(){
  state.queue=Q.filter(function(q){return state.wrongIds.indexOf(q.id)!==-1;});
  state.current=0;state.selected=null;state.answered=false;
  state.answers=[];state.score=0;state.showResult=false;state.isReview=true;state.wrongIds=[];
  startTimer();render();
}

function resetAll(){
  state.wrongIds=[];state.queue=Q.slice();state.current=0;state.selected=null;
  state.answers=[];state.answered=false;state.score=0;state.showResult=false;state.timeLeft=3600;state.isReview=false;
  startTimer();render();
}

function renderResult(){
  calcResult();
  var pct=Math.round(state.score/state.queue.length*100),pass=pct>=75;
  var h='<div class="result-card">';
  h+='<div style="font-size:48px;margin-bottom:8px;">'+(pass?'🏆':'📘')+'</div>';
  h+='<div class="result-title">'+(state.isReview?'復習完了！':'試験終了')+'</div>';
  h+='<div class="result-score">スコア：<b class="'+(pass?'pct-pass':'pct-fail')+'">'+state.score+'</b> / '+state.queue.length+'問</div>';
  h+='<div style="font-size:18px;font-weight:700;margin-bottom:8px;" class="'+(pass?'pct-pass':'pct-fail')+'">'+pct+'点</div>';
  h+='<div class="result-msg '+(pass?'msg-pass':'msg-fail')+'">'+(pass?'合格ライン（75点）達成！':'復習して再挑戦しましょう')+'</div>';
  h+='<div class="bar-track"><div class="bar-fill" style="background:'+(pass?'#16a34a':'#f59e0b')+';width:'+pct+'%;"></div></div>';
  if(state.wrongIds.length>0&&!state.isReview){
    h+='<div class="wrong-box"><p style="margin:0;font-weight:700;color:#854d0e;font-size:15px;">間違えた問題：'+state.wrongIds.length+'問</p>';
    h+='<p style="margin:4px 0 0;color:#92400e;font-size:14px;">復習モードで間違えた問題だけを再出題します。</p></div>';
  }
  h+='<div class="btn-row">';
  if(state.wrongIds.length>0&&!state.isReview)h+='<button class="btn-secondary" id="br">🔄 間違い問題を復習</button>';
  h+='<button class="btn-primary" id="breset">↺ 最初からやり直す</button></div></div>';
  root.innerHTML=h;
  var br=document.getElementById('br');if(br)br.onclick=startReview;
  document.getElementById('breset').onclick=resetAll;
}

function render(){
  if(state.showResult){renderResult();return;}
  if(!state.queue.length){root.innerHTML='<div>読み込み中...</div>';return;}
  var q=state.queue[state.current];
  syncAnswer();
  var prog=Math.round((state.current+1)/state.queue.length*100);
  var tc=state.timeLeft<300?'timer-warn':'';
  var h='<div class="badge-bar"><span>Vol.4 本番レベル（合格基準：75点以上）</span>';
  if(state.isReview)h+='<span class="review-tag">復習モード中</span>';
  h+='</div><div class="card">';
  h+='<div class="top-row"><div class="q-counter">📖 問 '+(state.current+1)+' / '+state.queue.length+'</div>';
  h+='<div class="timer-box">⏱ <span class="timer-text '+tc+'">'+fmt(state.timeLeft)+'</span></div></div>';
  h+='<div class="progress-track"><div class="progress-fill" style="width:'+prog+'%;"></div></div>';
  h+='<span class="cat-tag">'+esc(q.category)+'</span>';
  h+='<p class="q-text">'+esc(q.question)+'</p><div class="opt-list">';
  for(var i=0;i<q.options.length;i++){
    var cls='opt-btn';
    if(state.answered){
      if(i===q.answer)cls+=' opt-correct';
      else if(i===state.selected)cls+=' opt-wrong';
      else cls+=' opt-dim';
    }
    h+='<button class="'+cls+'" data-idx="'+i+'" '+(state.answered?'disabled':'')+' style="cursor:'+(state.answered?'default':'pointer')+'">';
    h+='<span class="opt-letter">'+String.fromCharCode(65+i)+'</span>';
    h+='<span class="opt-text">'+esc(q.options[i])+'</span></button>';
  }
  h+='</div>';
  if(state.answered){
    var ok=state.selected===q.answer;
    h+='<div class="explain-box '+(ok?'explain-correct':'explain-wrong')+'">';
    h+='<div class="explain-head" style="color:'+(ok?'#16a34a':'#dc2626')+'">'+(ok?'✅ 正解です！':'❌ 不正解です')+'</div>';
    h+='<p class="explain-body"><strong>解説：</strong>'+esc(q.explanation)+'</p>';
    h+='</div>';
  }
  h+='</div><nav class="bottom-nav" aria-label="問題移動">';
  h+='<button class="nav-btn nav-prev" id="bn-prev" type="button" '+(state.current===0?'disabled':'')+'>前へ</button>';
  h+='<button class="nav-btn nav-next" id="bn-next" type="button" '+(!state.answered?'disabled':'')+'>'+(state.current===state.queue.length-1?'結果を見る':'次へ')+'</button>';
  h+='</nav>';
  root.innerHTML=h;
  root.querySelectorAll('.opt-btn').forEach(function(b){
    b.onclick=function(){handleAnswer(parseInt(this.getAttribute('data-idx'),10));};
  });
  document.getElementById('bn-prev').onclick=prevQ;
  document.getElementById('bn-next').onclick=nextQ;
  updateScrollRoom();
}

startTimer();render();
window.addEventListener('resize',updateScrollRoom);
})();
</script>
</body>
</html>
